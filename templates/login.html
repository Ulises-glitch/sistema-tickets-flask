<!--- Implementar el código de base.html -->
{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<!--- La siguiente linea desarrolla un contenedor el cual va centrado -->
<div class="container vh-100 d-flex justify-content-center align-items-start pt-5">
    <!--- Sombra y ancho de contenedor -->
    <div class="card shadow-lg p-4" style="width: 400px;">
        <!--- Titulo que llevará el contendero dentro del template -->
        <h3 class="text-center mb-4"> <i class="bi bi-shield-lock me-2"></i> Iniciar Sesión </h3>
        <!--- Formularío para llenar los campos que aparecerán en el contenedor. Tipo POST para POSTeriormente regresar los datos al app.py-->
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">usuario:</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Contraseña:</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="d-grid">
                <button class="btn btn-primary btn-lg"><i class="bi bi-box-arrow-in-right me-2"></i> Entrar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
